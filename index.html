<!DOCTYPE html>

<title>GYM.UI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#ffffff;
display:flex;
justify-content:center;
}

.container{
width:420px;
padding:20px;
}

.home{
display:inline-block;
padding:8px 22px;
background:#eceff4;
border-radius:20px;
text-decoration:none;
color:#000;
font-size:22px;
box-shadow:0 3px 8px rgba(0,0,0,.18);
margin-bottom:15px;
}

.top{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.top div{
text-align:center;
}

.top p{
font-size:18px;
margin-bottom:8px;
}

.top a{
display:block;
width:70px;
height:70px;
background:#eceff4;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,.18);
}

.lista{
display:flex;
flex-direction:column;
gap:22px;
}

.item{
display:flex;
align-items:center;
gap:25px;
}

.numero{
width:95px;
height:95px;
background:#eceff4;
border-radius:15px;
display:flex;
justify-content:center;
align-items:center;
text-decoration:none;
color:#000;
font-size:58px;
font-weight:bold;
box-shadow:0 3px 8px rgba(0,0,0,.18);
}

.legenda{
font-size:30px;
font-weight:bold;
text-decoration:none;
color:#000;
}

</style>

</head>
